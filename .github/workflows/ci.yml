name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: pnpm build

      - name: Run tests with coverage
        run: npx vitest run --reporter=verbose --reporter=junit --outputFile=test-results.xml --coverage

      - name: Test Report
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Test Results
          path: test-results.xml
          reporter: java-junit

      - name: Coverage Summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node --input-type=module -e "
              import { readFileSync } from 'node:fs';
              const c = JSON.parse(readFileSync('./coverage/coverage-summary.json', 'utf8')).total;
              const fmt = (v) => v.pct + '%';
              const lines = [
                '## Test Coverage',
                '',
                '| Metric | Coverage |',
                '|--------|----------|',
                '| Statements | ' + fmt(c.statements) + ' |',
                '| Branches | ' + fmt(c.branches) + ' |',
                '| Functions | ' + fmt(c.functions) + ' |',
                '| Lines | ' + fmt(c.lines) + ' |',
              ];
              console.log(lines.join('\n'));
            " >> "$GITHUB_STEP_SUMMARY"
          fi
